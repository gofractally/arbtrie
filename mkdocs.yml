site_name: PsiTri
site_url: https://gofractally.github.io/arbtrie/
site_description: >-
  A persistent, transactional key-value store built on an adaptive radix trie.
  3x faster than RocksDB. ~9x less write amplification than page-based COW.
repo_url: https://github.com/gofractally/arbtrie
repo_name: gofractally/arbtrie
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gofractally/arbtrie
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Why PsiTri:
      - The Problem: why-psitri/problem.md
      - Design Philosophy: why-psitri/design.md
      - Tradeoffs & Limitations: why-psitri/tradeoffs.md
  - Getting Started:
      - Quick Start: getting-started/quickstart.md
      - Examples: examples.md
      - Transaction Contract: getting-started/transaction-contract.md
      - RocksDB Migration: getting-started/rocksdb-migration.md
      - MDBX Migration: getting-started/mdbx-migration.md
      - SQLite Migration: getting-started/sqlite-migration.md
      - API Reference: getting-started/api.md
  - How It Works:
      - Overview: architecture/overview.md
      - "DWAL: ART-Buffered Write Path": architecture/dwal.md
      - Control Blocks & Addressing: architecture/control-blocks.md
      - Segment Allocator (SAL): architecture/sal.md
      - Branchless Design: architecture/branchless-design.md
      - Smart Pointers & Thread Safety: architecture/smart-pointers.md
      - Concurrent Writers: architecture/concurrent-writers.md
      - Caching, Compaction & Beyond-RAM Scaling: architecture/caching.md
      - Write Protection & Durability: internals/write-protection.md
      - Data Integrity & Verification: internals/data-integrity.md
      - Recovery: internals/recovery.md
  - Benchmarks:
      - Bank Transaction Benchmark: benchmarks/bank.md
      - Random Upsert (200M Keys): benchmarks/random-upsert.md
      - Scale Benchmark (419M Keys): benchmarks/scale.md
      - "Drop-In: RocksDB API": benchmarks/rocksdb-api.md
      - "Drop-In: SQLite API": benchmarks/sqlite-api.md
      - "Drop-In: DuckDB Storage": benchmarks/duckdb-api.md
  - Development:
      - Contributing: development/contributing.md
      - Code Coverage: development/coverage.md
      - x86 SIMD Optimizations: benchmarks/x86_simd.md
      - Known Issues: internals/known-issues.md
